<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <!-- Bujo Splash / Home Screen Background: 1080x1920 portrait -->
  <defs>
    <radialGradient id="warmGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="60%" stop-color="#F2EADB"/>
      <stop offset="100%" stop-color="#E8D9BD"/>
    </radialGradient>
    <linearGradient id="redFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#9A0C22"/>
    </linearGradient>
  </defs>

  <!-- Warm off-white gradient background -->
  <rect x="0" y="0" width="1080" height="1920" fill="url(#warmGlow)"/>

  <!-- Decorative film strips across the top and bottom edges -->
  <rect x="0" y="0" width="1080" height="80" fill="#2B1810"/>
  <g fill="#FAF7F2">
    <rect x="30"  y="28" width="48" height="28" rx="4"/>
    <rect x="120" y="28" width="48" height="28" rx="4"/>
    <rect x="210" y="28" width="48" height="28" rx="4"/>
    <rect x="300" y="28" width="48" height="28" rx="4"/>
    <rect x="390" y="28" width="48" height="28" rx="4"/>
    <rect x="480" y="28" width="48" height="28" rx="4"/>
    <rect x="570" y="28" width="48" height="28" rx="4"/>
    <rect x="660" y="28" width="48" height="28" rx="4"/>
    <rect x="750" y="28" width="48" height="28" rx="4"/>
    <rect x="840" y="28" width="48" height="28" rx="4"/>
    <rect x="930" y="28" width="48" height="28" rx="4"/>
    <rect x="1020" y="28" width="30" height="28" rx="4"/>
  </g>

  <rect x="0" y="1840" width="1080" height="80" fill="#2B1810"/>
  <g fill="#FAF7F2">
    <rect x="30"  y="1868" width="48" height="28" rx="4"/>
    <rect x="120" y="1868" width="48" height="28" rx="4"/>
    <rect x="210" y="1868" width="48" height="28" rx="4"/>
    <rect x="300" y="1868" width="48" height="28" rx="4"/>
    <rect x="390" y="1868" width="48" height="28" rx="4"/>
    <rect x="480" y="1868" width="48" height="28" rx="4"/>
    <rect x="570" y="1868" width="48" height="28" rx="4"/>
    <rect x="660" y="1868" width="48" height="28" rx="4"/>
    <rect x="750" y="1868" width="48" height="28" rx="4"/>
    <rect x="840" y="1868" width="48" height="28" rx="4"/>
    <rect x="930" y="1868" width="48" height="28" rx="4"/>
    <rect x="1020" y="1868" width="30" height="28" rx="4"/>
  </g>

  <!-- Main wordmark, centered vertically -->
  <text
    x="540" y="940"
    font-family="Georgia, 'Playfair Display', serif"
    font-size="200"
    font-weight="900"
    text-anchor="middle"
    textLength="680"
    lengthAdjust="spacingAndGlyphs"
    fill="url(#redFill)">BUJO</text>

  <!-- Decorative divider above tagline -->
  <rect x="400" y="990" width="280" height="5" fill="#C8102E"/>

  <!-- Tagline -->
  <text
    x="540" y="1060"
    font-family="Georgia, serif"
    font-size="44"
    font-style="italic"
    text-anchor="middle"
    fill="#2B1810">A game of movies</text>
</svg>
