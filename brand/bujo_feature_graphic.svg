<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Bujo Play Store Feature Graphic: 1024x500 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#EFE7D7"/>
    </linearGradient>
    <linearGradient id="redFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#9A0C22"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="500" fill="url(#bgGrad)"/>

  <!-- Top film strip -->
  <rect x="0" y="0" width="1024" height="42" fill="#2B1810"/>
  <g fill="#FAF7F2">
    <rect x="20"  y="12" width="26" height="18" rx="3"/>
    <rect x="70"  y="12" width="26" height="18" rx="3"/>
    <rect x="120" y="12" width="26" height="18" rx="3"/>
    <rect x="170" y="12" width="26" height="18" rx="3"/>
    <rect x="220" y="12" width="26" height="18" rx="3"/>
    <rect x="270" y="12" width="26" height="18" rx="3"/>
    <rect x="320" y="12" width="26" height="18" rx="3"/>
    <rect x="370" y="12" width="26" height="18" rx="3"/>
    <rect x="420" y="12" width="26" height="18" rx="3"/>
    <rect x="470" y="12" width="26" height="18" rx="3"/>
    <rect x="520" y="12" width="26" height="18" rx="3"/>
    <rect x="570" y="12" width="26" height="18" rx="3"/>
    <rect x="620" y="12" width="26" height="18" rx="3"/>
    <rect x="670" y="12" width="26" height="18" rx="3"/>
    <rect x="720" y="12" width="26" height="18" rx="3"/>
    <rect x="770" y="12" width="26" height="18" rx="3"/>
    <rect x="820" y="12" width="26" height="18" rx="3"/>
    <rect x="870" y="12" width="26" height="18" rx="3"/>
    <rect x="920" y="12" width="26" height="18" rx="3"/>
    <rect x="970" y="12" width="26" height="18" rx="3"/>
  </g>

  <!-- Bottom film strip -->
  <rect x="0" y="458" width="1024" height="42" fill="#2B1810"/>
  <g fill="#FAF7F2">
    <rect x="20"  y="470" width="26" height="18" rx="3"/>
    <rect x="70"  y="470" width="26" height="18" rx="3"/>
    <rect x="120" y="470" width="26" height="18" rx="3"/>
    <rect x="170" y="470" width="26" height="18" rx="3"/>
    <rect x="220" y="470" width="26" height="18" rx="3"/>
    <rect x="270" y="470" width="26" height="18" rx="3"/>
    <rect x="320" y="470" width="26" height="18" rx="3"/>
    <rect x="370" y="470" width="26" height="18" rx="3"/>
    <rect x="420" y="470" width="26" height="18" rx="3"/>
    <rect x="470" y="470" width="26" height="18" rx="3"/>
    <rect x="520" y="470" width="26" height="18" rx="3"/>
    <rect x="570" y="470" width="26" height="18" rx="3"/>
    <rect x="620" y="470" width="26" height="18" rx="3"/>
    <rect x="670" y="470" width="26" height="18" rx="3"/>
    <rect x="720" y="470" width="26" height="18" rx="3"/>
    <rect x="770" y="470" width="26" height="18" rx="3"/>
    <rect x="820" y="470" width="26" height="18" rx="3"/>
    <rect x="870" y="470" width="26" height="18" rx="3"/>
    <rect x="920" y="470" width="26" height="18" rx="3"/>
    <rect x="970" y="470" width="26" height="18" rx="3"/>
  </g>

  <!-- BUJO wordmark centered -->
  <text
    x="512" y="245"
    font-family="Georgia, 'Playfair Display', serif"
    font-size="130"
    font-weight="900"
    text-anchor="middle"
    textLength="480"
    lengthAdjust="spacingAndGlyphs"
    fill="url(#redFill)">BUJO</text>

  <!-- Decorative top divider above tagline -->
  <rect x="440" y="285" width="144" height="3" fill="#C8102E"/>

  <!-- Tagline -->
  <text
    x="512" y="330"
    font-family="Georgia, serif"
    font-size="30"
    font-style="italic"
    text-anchor="middle"
    fill="#2B1810"
    letter-spacing="3">A game of movies</text>
</svg>
